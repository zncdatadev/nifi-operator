apiVersion: zookeeper.kubedoop.dev/v1alpha1
kind: ZookeeperCluster
metadata:
  name: zookeepercluster-sample
spec:
  image:
    productVersion: "3.9.2"
  clusterConfig:
    listenerClass: cluster-internal
  servers:
    roleGroups:
      default:
        replicas: 1
---
apiVersion: zookeeper.kubedoop.dev/v1alpha1
kind: ZookeeperZnode
metadata:
  name: kafka-znode
spec:
  clusterRef:
    name: zookeepercluster-sample
