---
# Assert the NifiCluster is created
apiVersion: nifi.kubedoop.dev/v1alpha1
kind: NifiCluster
metadata:
  name: reporting-task-nifi
---
# Assert the sensitive key secret is created (auto-generated)
apiVersion: v1
kind: Secret
metadata:
  name: reporting-task-sensitive-key
---
# Assert the reporting task Service is created targeting a single NiFi node
apiVersion: v1
kind: Service
metadata:
  name: reporting-task-nifi-reporting-task
spec:
  selector:
    statefulset.kubernetes.io/pod-name: reporting-task-nifi-node-default-0
  ports:
    - name: https
      port: 9443
---
# Assert the reporting task Job is created
apiVersion: batch/v1
kind: Job
metadata:
  name: (reporting-task-nifi-create-reporting-task-*)
---
# Assert the StatefulSet is created
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: reporting-task-nifi-node-default
